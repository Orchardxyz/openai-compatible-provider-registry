name: Publish Package

on:
  workflow_dispatch:
    inputs:
      tag:
        description: npm dist-tag to publish with
        required: true
        default: beta
        type: choice
        options:
          - beta
          - latest

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-package
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate release candidate
        run: pnpm release:check

      - name: Read package metadata
        id: package
        run: |
          name=$(node --print "require('./package.json').name")
          version=$(node --print "require('./package.json').version")
          echo "name=$name" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Check whether version is already published
        id: published
        run: |
          if npm view "${{ steps.package.outputs.name }}@${{ steps.package.outputs.version }}" version >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        if: steps.published.outputs.exists == 'false'
        run: npm publish --tag "${{ inputs.tag }}"

      - name: Report skipped publish
        if: steps.published.outputs.exists == 'true'
        run: echo "${{ steps.package.outputs.name }}@${{ steps.package.outputs.version }} is already published; skipping."
